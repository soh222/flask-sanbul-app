<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산불 예측 입력</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
        }

        .navbar {
            padding: 12px 20px;
        }

        .nav-btn {
            display: inline-block;
            background-color: #5bc0de;
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 4px;
            margin-right: 6px;
            font-size: 14px;
        }

        .container {
            width: 420px;
            margin: 20px auto;
        }

        h1 {
            font-size: 42px;
            font-weight: normal;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 16px;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 9px 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-btn {
            margin-top: 16px;
            background-color: #337ab7;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .footer {
            color: #555;
            font-size: 13px;
            margin-top: 28px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/" class="nav-btn">Home</a>
        <a href="/prediction" class="nav-btn">FF Prediction</a>
    </div>

    <div class="container">
        <h1>Fill in the data</h1>

        <form action="/prediction" method="post">
            <label for="longitude">longitude(1~7)</label>
            <input type="text" id="longitude" name="longitude" required>

            <label for="latitude">latitude(1~7)</label>
            <input type="text" id="latitude" name="latitude" required>
            
            <label for="month">month(01-Jan ~ Dec-12)</label>
            <input type="text" id="month" name="month" required>

            <label for="day">day(00-sun ~ 06-sat, 07-hol)</label>
            <input type="text" id="day" name="day" required>

            <label for="avg_temp">avg_temp</label>
            <input type="text" id="avg_temp" name="avg_temp" required>

            <label for="max_temp">max_temp</label>
            <input type="text" id="max_temp" name="max_temp" required>

            <label for="max_wind_speed">max_wind_speed</label>
            <input type="text" id="max_wind_speed" name="max_wind_speed" required>

            <label for="avg_wind">avg_wind</label>
            <input type="text" id="avg_wind" name="avg_wind" required>

            <button type="submit" class="submit-btn">Submit</button>
        </form>

        <div class="footer">© 2022810052 이소희</div>
    </div>
</body>
</html>
